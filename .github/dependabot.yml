version: 2
updates:
  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: weekly
    ignore:
      # Major bumps need manual migration + visual QA; pin to current major.
      - dependency-name: tailwindcss
        update-types: [version-update:semver-major]
      - dependency-name: framer-motion
        update-types: [version-update:semver-major]
      # Astro core + adapters version-lock together; majors are breaking.
      - dependency-name: astro
        update-types: [version-update:semver-major]
      - dependency-name: "@astrojs/*"
        update-types: [version-update:semver-major]
  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
    ignore:
      # zod 4 has breaking API changes on the Notion-write validation path.
      - dependency-name: zod
        update-types: [version-update:semver-major]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
