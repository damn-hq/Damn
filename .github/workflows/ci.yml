name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [client, server]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json
      - run: npm ci
        working-directory: ${{ matrix.dir }}
      - run: npm run typecheck
        working-directory: ${{ matrix.dir }}
      - run: npm test --if-present
        working-directory: ${{ matrix.dir }}
